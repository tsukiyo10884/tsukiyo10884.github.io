			function mouseOver(id){
				if(x == 0){
					document.getElementById(id).style.opacity=1;

				}else{
					document.getElementById(id).style.opacity=0.1;
					document.getElementById(id+"_").style.opacity=0;
				}
			}
			function mouseOut(id){

				}else{
