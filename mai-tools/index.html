<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>maimai小工具</title>
  <link rel="stylesheet" href="./main.css" />
  <link rel="stylesheet" href="../bootstrap-5.3.6-dist/css/bootstrap.min.css">
  <script src="../bootstrap-5.3.6-dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="plate.js"></script>
  <script src="rating.js"></script>
  <script src="level.js"></script>
</head>

<body>
  <h5>譜面定數來源： <a href="https://arcade-songs.zetaraku.dev/maimai/about/" target="_blank">zetaraku</a> | 刪除曲來源： <a
      href="https://maimai.fandom.com/zh/wiki/%E5%88%AA%E9%99%A4%E6%9B%B2%E4%B8%80%E8%A6%BD"
      target="_blank">maimai中文維基</a></h5>
  <button id="test" onclick="LoadLocalJson('testData.json')">測試</button>
  <div id="output"></div>
  <div id="button-group" style="display: none;">
    <button onclick="showTable('rating')">R值入選曲</button>
    <button onclick="showTable('plate')">名牌版進度</button>
    <button onclick="showTable('level')">等級進度</button>
    <div id="user-info"></div>
  </div>

  <div id="song-table" class="ms-1"></div>

  <script>
    function LoadLocalJson(filePath) {
      $.getJSON(filePath, function (json) {
        console.log(json);
        $('#button-group').show();
        $('#test').hide();
        output.innerHTML = "資料擷取完畢" + "<textarea id=\"json-data\" style=\"display:none;\">" + JSON.stringify(json, null, 2) + "</textarea>";
        refreashData();
      });
    }

    window.addEventListener("message", (event) => {
      $('#test').hide();
      const data = event.data;
      if (!data || typeof data !== "object") return;
      const output = document.getElementById("output");
      $('#button-group').show();
      switch (data.type) {
        case "difficulty":
          output.innerHTML = "取得成績中(" + data.payload + ")";
          break;
        case "result":
          output.innerHTML = "資料擷取完畢" + "<textarea id=\"json-data\" style=\"display:none;\">" + JSON.stringify(data.payload, null, 2) + "</textarea>";
          refreashData();
          break;
      }
    });
    var data = "";
    if (document.getElementById('json-data') !== null) {
      refreashData();
    }
    function refreashData() {
      data = JSON.parse(document.getElementById('json-data')?.textContent);
      $('#user-info').html(createUserInfo(data.user));
    }

    function createUserInfo(user) {
      return `
        <div class="user-info">${user}</div>`;
    }

    async function showTable(type) {
    const container = document.getElementById('song-table');
    if (type === 'rating') {
        
        const html = [
            createRatingSection('new songs', data.ratingSongList.rating_new),
            createRatingSection('others', data.ratingSongList.rating_others)
        ].join('');
        container.innerHTML = html;
    }
    else if (type === 'plate') {
        
        const html = [
            await showPlateList(),
        ].join('');
        container.innerHTML = html;
    } else if (type === 'level') {
        
        const html = [
            await showLevelList(),
        ].join('');
        container.innerHTML = html;
    } else {
        container.style.display = 'none';
        container.innerHTML = '';
    }
}
  </script>
</body>

</html>
