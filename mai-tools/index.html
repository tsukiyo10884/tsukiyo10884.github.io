<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>maimai小工具</title>
  <h5>譜面定數來源： <a href="https://arcade-songs.zetaraku.dev/maimai/about/">zetaraku</a></h5>
  <link rel="stylesheet" href="./main.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body>
  <div id="output"></div>
  <div id="button-group" style="display: none;">
    <button onclick="showTable('rating')">R值入選曲</button>
    <button onclick="showTable('plate')">名牌版進度</button>
    <button>等級進度</button>
  </div>

  <div id="song-table" class="table" style="width: 1000px;"></div>

  <script>
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;

      const output = document.getElementById("output");
      $('#button-group').show();

      switch (data.type) {
        case "difficulty":
          output.innerHTML = "取得成績中(" + data.payload + ")";
          break;
        case "result":
          output.innerHTML = "取得資料" + "<textarea id=\"json-data\" style=\"display:none;\">" + JSON.stringify(data.payload, null, 2) + "</textarea>";
          refreashData();
          break;
      }
    });
    var data = "";
    if (document.getElementById('json-data') !== null) {
      refreashData();
    }
    function refreashData() {
      data = JSON.parse(document.getElementById('json-data')?.textContent);
    }

    function createUserInfo(user) {
      return `
        <div class="user-info">${user}</div>`;
    }

    function createSongCard(song, type) {
      const diffClass = song.difficulty.replace(" ", "-").toLowerCase();
      let isCompleted = false;

      switch (type) {
        case '極':
          isCompleted = song.fc || song.fcp || song.ap || song.app || song.fs || song.fsp || song.fdx || song.fdxp;
        case '将':
          isCompleted = parseFloat(song.score) > 100;
          break;
        case '神':
          isCompleted = song.ap || song.app;
          break;
        case '舞舞':
          isCompleted = song.fdx;
          break;
      }

      return `
    <div class="song-card difficulty-glow ${diffClass} ${isCompleted ? 'completed' : ''}" style="background-image: url('${song.image}')">
      <div class="song-overlay"></div>
      <div class="block-inner-level song-content text-shadow">${song.internalLevel == null ? '' : song.internalLevel}</div>
      <div class="block-type song-content text-shadow">${song.type.toUpperCase()}</div>
      <div class="block-song-name song-content text-shadow">${song.title.substring(0, 30)}</div>
      <div class="block-score song-content text-shadow">${song.score}</div>
      ${isCompleted ? '<div class="completion-check">✔</div>' : ''}
    </div>`;
    }

    function createRatingSection(title, songs) {
      return `
        <div class="section-title">${title}</div>
        <div class="song-grid">
          ${songs.map(createSongCard).join('')}
        </div>`;
    }

    async function showTable(type) {
      const container = document.getElementById('song-table');
      if (type === 'rating') {
        container.style.display = 'flex';
        const html = [
          createUserInfo(data.user),
          createRatingSection('new songs', data.ratingSongList.rating_new),
          createRatingSection('old songs', data.ratingSongList.rating_others)
        ].join('');
        container.innerHTML = html;
      }
      else if (type === 'plate') {
        container.style.display = 'flex';
        const html = [
          createUserInfo(data.user),
          await showPlateList(),
        ].join('');
        container.innerHTML = html;
      } else {
        container.style.display = 'none';
      }
    }

    async function showPlateList() {
      const versionList = await fetch('version.json')
        .then(res => res.json());
      return `
        <div class="plate-list">
          ${versionList.map(version => `
            <button class="plate-button" onclick="showVersionButton('${version.versionName}','${version.plateName}')">
              ${version.plateName} (${version.versionName})
            </button><br/>
          `).join('')}
        </div>`;
    }

    function showVersionButton(versionName, plateName) {
      const container = document.getElementById('song-table');
      container.style.display = 'flex';
      const html = [
        createUserInfo(data.user),
        `
        <div class="section-title">${versionName} 進度</div>
        <div class="plate-button-group">
          <button class="plate-button" onclick="showPlateProgress('${versionName}', '極')">${plateName}極</button>
          <button class="plate-button" onclick="showPlateProgress('${versionName}', '将')">${plateName}将</button>
          <button class="plate-button" onclick="showPlateProgress('${versionName}', '神')">${plateName}神</button>
          <button class="plate-button" onclick="showPlateProgress('${versionName}', '舞舞')">${plateName}舞舞</button>
        </div>`,
      ].join('');
      container.innerHTML = html;
    }

    function showPlateProgress(versionName, type) {
      const container = document.getElementById('song-table');
      container.style.display = 'flex';
      const songs = data.songs.filter(song => song.version === versionName);
      var plateSongs = "";
      const html = [
        createUserInfo(data.user),
        `
      <div class="section-title">${versionName}進度</div>
        <div class="song-grid">
          ${songs.map(song => createSongCard(song, type)).join('')}
        </div>`,
      ].join('');
      container.innerHTML = html;
    }
  </script>
</body>

</html>
