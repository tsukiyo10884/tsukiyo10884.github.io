<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>maimai小工具</title>
  <link rel="stylesheet" href="./main.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="plate.js"></script>
  <script src="rating.js"></script>
  <script src="level.js"></script>
</head>

<body>
  <div class="main mt-3 mb-5">
    <h6>譜面定數： <a href="https://arcade-songs.zetaraku.dev/maimai/about/" target="_blank">zetaraku</a> | 刪除曲： <a
        href="https://maimai.fandom.com/zh/wiki/%E5%88%AA%E9%99%A4%E6%9B%B2%E4%B8%80%E8%A6%BD"
        target="_blank">maimai中文維基</a> | rating計算方法： <a
        href="https://sgimera.github.io/mai_RatingAnalyzer/maidx_rating.html" target="_blank">sgimera</a></h6>
    <button id="test" onclick="LoadLocalJson('test_data.json')">測試</button>
    <div id="output"></div>
    <div id="button-group" class="row" style="display: none;">
      <div class="col-3">
        <button class="w-100" onclick="showTable('rating')">R值入選曲</button>
      </div>
      <div class="col-3">
        <button class="w-100" onclick="showTable('plate')">名牌版進度</button>
      </div>
      <div class="col-3">
        <button class="w-100" onclick="showTable('level')">等級進度</button>
      </div>
      <div class="result-container">
        <div class="row" style="border-bottom: 1px solid #444">
          <div id="user-info" class="user-info col-6"></div>
          <div id="stat" class="col-6 d-flex align-items-center" style="font-family: Consolas;"></div>
        </div>
        <div id="song-table" class="ms-1 mt-1"></div>
      </div>
    </div>
  </div>

  <script>
    function LoadLocalJson(filePath) {
      $.getJSON(filePath, function (json) {
        $('#button-group').show();
        $('#test').hide();
        output.innerHTML = "<textarea id=\"json-data\" style=\"display:none;\">" + JSON.stringify(json, null, 2) + "</textarea>";
        refreashData();
      });
    }

    window.addEventListener("message", (event) => {
      $('#test').hide();
      const data = event.data;
      if (!data || typeof data !== "object") return;
      const output = document.getElementById("output");
      switch (data.type) {
        case "difficulty":
          output.innerHTML = "取得成績中(" + data.payload + ")";
          break;
        case "result":
          output.innerHTML = "<textarea id=\"json-data\" style=\"display:none;\">" + JSON.stringify(data.payload, null, 2) + "</textarea>";
          $('#button-group').show();
          refreashData();
          break;
      }
    });
    var data = "";
    if (document.getElementById('json-data') !== null) {
      refreashData();
    }
    function refreashData() {
      data = JSON.parse(document.getElementById('json-data')?.textContent);
      $('#user-info').html(data.user);
    }

    async function showTable(type) {
      $('#level-filter').hide();
      $('#stat').html('');
      const container = document.getElementById('song-table');
      if (type === 'rating') {
        await initRatingList();
      } else if (type === 'plate') {
        await initPlateList();
      } else if (type === 'level') {
        initLevelList();
      } else {
        container.style.display = 'none';
        container.innerHTML = '';
      }
    }
  </script>
</body>

</html>
